name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis/redis-stack-server:7.2.0-v10
        ports:
          - 6379:6379
        # Mirrors production (SECURITY.md H1: Redis always requires a
        # password) so CI exercises the same auth path the app uses for
        # real, rather than testing against an unauthenticated Redis.
        env:
          REDIS_ARGS: "--requirepass ci-test-redis-password"
        options: >-
          --health-cmd "redis-cli -a ci-test-redis-password ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_PASSWORD: ci-test-redis-password
      JWT_SECRET: ci-test-secret-not-for-production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip and HuggingFace models
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/huggingface
          key: ${{ runner.os }}-backend-${{ hashFiles('backend/requirements.txt', 'backend/requirements-dev.txt') }}

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: backend
        run: PYTHONPATH=. pytest tests/ -v

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm test

      - name: Build
        working-directory: frontend
        run: npm run build
