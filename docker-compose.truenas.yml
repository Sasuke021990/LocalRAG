version: '3.8'

services:
  redis:
    image: redis/redis-stack:7.2.0-v10
    container_name: local-rag-redis
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      # Map this to a TrueNAS dataset for your Vector database —
      # set REDIS_DATA_PATH in .env (copy .env.example)
      - ${REDIS_DATA_PATH:?Set REDIS_DATA_PATH in .env}:/data
    command: redis-stack-server --appendonly yes
    environment:
      - REDIS_ARGS=--appendonly yes
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    # image: yourusername/localrag-backend:latest
    container_name: local-rag-backend
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - API_KEY=${API_KEY:-}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    volumes:
      # Map this to your TrueNAS dataset for embedded files / JSON backups —
      # set KNOWLEDGE_DATA_PATH in .env (copy .env.example)
      - ${KNOWLEDGE_DATA_PATH:?Set KNOWLEDGE_DATA_PATH in .env}:/app/data

    # Optional NVIDIA GPU Support for TrueNAS
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    # image: yourusername/localrag-frontend:latest
    container_name: local-rag-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:8000
      - PORT=3000
      - API_KEY=${API_KEY:-}
    restart: unless-stopped
