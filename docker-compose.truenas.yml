version: '3.8'

services:
  redis:
    image: redis/redis-stack:7.2.0-v10
    container_name: local-rag-redis
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      # Map this to a TrueNAS dataset for your Vector database â€”
      # set REDIS_DATA_PATH in .env (copy .env.example)
      - ${REDIS_DATA_PATH:?Set REDIS_DATA_PATH in .env}:/data
    command: redis-stack-server --appendonly yes
    environment:
      - REDIS_ARGS=--appendonly yes
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    # image: yourusername/localrag-backend:latest
    container_name: local-rag-backend
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env (e.g. openssl rand -hex 32)}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL:-http://localhost:3000}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:3000/api/auth/google/callback}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@vaultly.local}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-True}
      - WEBHOOK_MAX_RETRIES=${WEBHOOK_MAX_RETRIES:-3}
      - WEBHOOK_TIMEOUT_SECONDS=${WEBHOOK_TIMEOUT_SECONDS:-5}
      # Local AI answers (grounded LLM) â€” off by default (see .env.example).
      - LLM_ENABLED=${LLM_ENABLED:-False}
      - LLM_BACKEND=${LLM_BACKEND:-embedded}
      - LLM_API_BASE=${LLM_API_BASE:-http://localhost:11434/v1}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-qwen2.5:1.5b-instruct}
      - LLM_VISION_MODEL=${LLM_VISION_MODEL:-glm-ocr}
      - LLM_MAX_CONCURRENCY=${LLM_MAX_CONCURRENCY:-8}
      - LLM_MODEL_REPO=${LLM_MODEL_REPO:-Qwen/Qwen2.5-1.5B-Instruct-GGUF}
      - LLM_MODEL_FILE=${LLM_MODEL_FILE:-qwen2.5-1.5b-instruct-q4_k_m.gguf}
      - LLM_THINKING_ENABLED=${LLM_THINKING_ENABLED:-False}
      - LLM_CONTEXT_SIZE=${LLM_CONTEXT_SIZE:-4096}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-512}
      - LLM_THREADS=${LLM_THREADS:-0}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.0}
      - LLM_MIN_RELEVANCE_SCORE=${LLM_MIN_RELEVANCE_SCORE:-0.0}
    volumes:
      # Map this to your TrueNAS dataset for embedded files / JSON backups â€”
      # set KNOWLEDGE_DATA_PATH in .env (copy .env.example)
      - ${KNOWLEDGE_DATA_PATH:?Set KNOWLEDGE_DATA_PATH in .env}:/app/data
      # Persist downloaded LLM weights (~1GB) â€” set MODELS_DATA_PATH in .env
      # (only needed when LLM_ENABLED=true).
      - ${MODELS_DATA_PATH:-./models}:/app/models

    # Optional NVIDIA GPU Support for TrueNAS
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    # image: yourusername/localrag-frontend:latest
    container_name: local-rag-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:8000
      - PORT=3000
    restart: unless-stopped
