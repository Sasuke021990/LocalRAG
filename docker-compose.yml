version: '3.8'

services:
  # Redis Stack for vector storage and caching.
  # SECURITY: reachable only over the internal compose network + loopback, and
  # requires a password. Never publish 6379 (or the RedisInsight UI on 8001) on
  # a public interface — Redis holds every tenant's password hashes, tokens,
  # and PII. See SECURITY.md (finding H1).
  redis:
    image: redis/redis-stack:7.2.0-v10
    container_name: local-rag-redis
    ports:
      # Loopback-only host bind for local debugging (redis-cli from the host).
      # Drop this line entirely in production — the backend reaches Redis over
      # the compose network as `redis:6379` and needs no host mapping.
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-stack-server --appendonly yes --requirepass "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env (e.g. openssl rand -hex 32)}"
    restart: unless-stopped

  # Backend API service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: local-rag-backend
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - REDIS_PASSWORD=${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env (e.g. openssl rand -hex 32)}
      - LD_LIBRARY_PATH=/usr/lib/wsl/lib
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env (e.g. openssl rand -hex 32)}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL:-http://localhost:3000}
      # Set TRUST_PROXY_HEADERS=true only when a trusted reverse proxy sets
      # X-Forwarded-For (needed for correct per-IP rate limiting behind a proxy).
      - TRUST_PROXY_HEADERS=${TRUST_PROXY_HEADERS:-False}
      # /docs + /redoc publish the full API surface unauthenticated -- leave
      # on for local/homelab use, set to false for an internet-facing deploy
      # that doesn't need public API docs.
      - API_DOCS_ENABLED=${API_DOCS_ENABLED:-True}
      # Auth rate limiting (Redis-backed, per client IP). See .env.example.
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-True}
      - RATE_LIMIT_LOGIN_MAX=${RATE_LIMIT_LOGIN_MAX:-10}
      - RATE_LIMIT_LOGIN_WINDOW=${RATE_LIMIT_LOGIN_WINDOW:-60}
      - RATE_LIMIT_SIGNUP_MAX=${RATE_LIMIT_SIGNUP_MAX:-5}
      - RATE_LIMIT_SIGNUP_WINDOW=${RATE_LIMIT_SIGNUP_WINDOW:-3600}
      - RATE_LIMIT_RESET_MAX=${RATE_LIMIT_RESET_MAX:-5}
      - RATE_LIMIT_RESET_WINDOW=${RATE_LIMIT_RESET_WINDOW:-3600}
      - SESSION_IDLE_TIMEOUT_SECONDS=${SESSION_IDLE_TIMEOUT_SECONDS:-60}
      # Billing / plan limits (INR) — Free/Pro/Max storage, AI-question quota,
      # saved-conversation cap, pricing, team size. See .env.example.
      - FREE_STORAGE_GB=${FREE_STORAGE_GB:-1}
      - PRO_STORAGE_GB=${PRO_STORAGE_GB:-5}
      - MAX_STORAGE_GB=${MAX_STORAGE_GB:-15}
      - FREE_AI_QUESTIONS_PER_DAY=${FREE_AI_QUESTIONS_PER_DAY:-10}
      - PRO_AI_QUESTIONS_PER_DAY=${PRO_AI_QUESTIONS_PER_DAY:-25}
      - MAX_AI_QUESTIONS_PER_DAY_PER_USER=${MAX_AI_QUESTIONS_PER_DAY_PER_USER:-30}
      - FREE_CONVERSATION_LIMIT=${FREE_CONVERSATION_LIMIT:-5}
      - PRO_CONVERSATION_LIMIT=${PRO_CONVERSATION_LIMIT:-15}
      - MAX_CONVERSATION_LIMIT=${MAX_CONVERSATION_LIMIT:-20}
      - PRO_PRICE_MONTHLY_INR=${PRO_PRICE_MONTHLY_INR:-59}
      - PRO_PRICE_ANNUAL_INR=${PRO_PRICE_ANNUAL_INR:-600}
      - MAX_PRICE_MONTHLY_INR=${MAX_PRICE_MONTHLY_INR:-79}
      - MAX_PRICE_ANNUAL_INR=${MAX_PRICE_ANNUAL_INR:-800}
      - MAX_PLAN_TEAM_MEMBERS=${MAX_PLAN_TEAM_MEMBERS:-5}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:3000/api/auth/google/callback}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@vaultly.local}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-True}
      - WEBHOOK_MAX_RETRIES=${WEBHOOK_MAX_RETRIES:-3}
      - WEBHOOK_TIMEOUT_SECONDS=${WEBHOOK_TIMEOUT_SECONDS:-5}
      # Local AI answers (grounded LLM). Off by default — flip LLM_ENABLED=true
      # and the model downloads once (~1GB) into the models volume on startup.
      - LLM_ENABLED=${LLM_ENABLED:-False}
      - LLM_BACKEND=${LLM_BACKEND:-embedded}
      - LLM_API_BASE=${LLM_API_BASE:-http://localhost:11434/v1}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-qwen2.5:1.5b-instruct}
      - LLM_VISION_MODEL=${LLM_VISION_MODEL:-glm-ocr}
      - LLM_MAX_CONCURRENCY=${LLM_MAX_CONCURRENCY:-8}
      - LLM_MODEL_REPO=${LLM_MODEL_REPO:-Qwen/Qwen2.5-1.5B-Instruct-GGUF}
      - LLM_MODEL_FILE=${LLM_MODEL_FILE:-qwen2.5-1.5b-instruct-q4_k_m.gguf}
      - LLM_THINKING_ENABLED=${LLM_THINKING_ENABLED:-False}
      - LLM_CONTEXT_SIZE=${LLM_CONTEXT_SIZE:-4096}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-512}
      - LLM_THREADS=${LLM_THREADS:-0}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.0}
      - LLM_MIN_RELEVANCE_SCORE=${LLM_MIN_RELEVANCE_SCORE:-0.0}
    volumes:
      # Mount the knowledge base directory for file storage — set
      # KNOWLEDGE_DATA_PATH in .env (copy .env.example), defaults to ./data
      - ${KNOWLEDGE_DATA_PATH:-./data}:/app/data
      # Persist downloaded LLM weights across container rebuilds (~1GB).
      - models_data:/app/models
      # Mount WSL library for AMD DirectML support on Windows
      - /usr/lib/wsl:/usr/lib/wsl
    # GPU Acceleration Setup:
    # 1. For AMD GPUs (Windows/WSL2 DirectML):
    devices:
      - /dev/dxg:/dev/dxg
    # 2. For NVIDIA GPUs, uncomment below instead of devices above:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    restart: unless-stopped

  # Frontend service (Vite + Express app)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: local-rag-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:8000
      - PORT=3000
    restart: unless-stopped

volumes:
  redis_data:
  models_data: