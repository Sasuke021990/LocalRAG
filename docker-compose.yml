version: '3.8'

services:
  # Redis Stack for vector storage and caching
  redis:
    image: redis/redis-stack:7.2.0-v10
    container_name: local-rag-redis
    ports:
      - "6379:6379"
      - "8001:8001"  # RedisInsight web UI
    volumes:
      - redis_data:/data
    command: redis-stack-server --appendonly yes
    environment:
      - REDIS_ARGS=--appendonly yes
    restart: unless-stopped

  # Backend API service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: local-rag-backend
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - LD_LIBRARY_PATH=/usr/lib/wsl/lib
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env (e.g. openssl rand -hex 32)}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL:-http://localhost:3000}
      - SESSION_IDLE_TIMEOUT_SECONDS=${SESSION_IDLE_TIMEOUT_SECONDS:-60}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:3000/api/auth/google/callback}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@vaultly.local}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-True}
      - WEBHOOK_MAX_RETRIES=${WEBHOOK_MAX_RETRIES:-3}
      - WEBHOOK_TIMEOUT_SECONDS=${WEBHOOK_TIMEOUT_SECONDS:-5}
      # Local AI answers (grounded LLM). Off by default — flip LLM_ENABLED=true
      # and the model downloads once (~1GB) into the models volume on startup.
      - LLM_ENABLED=${LLM_ENABLED:-False}
      - LLM_BACKEND=${LLM_BACKEND:-embedded}
      - LLM_API_BASE=${LLM_API_BASE:-http://localhost:11434/v1}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-qwen2.5:1.5b-instruct}
      - LLM_VISION_MODEL=${LLM_VISION_MODEL:-glm-ocr}
      - LLM_MAX_CONCURRENCY=${LLM_MAX_CONCURRENCY:-8}
      - LLM_MODEL_REPO=${LLM_MODEL_REPO:-Qwen/Qwen2.5-1.5B-Instruct-GGUF}
      - LLM_MODEL_FILE=${LLM_MODEL_FILE:-qwen2.5-1.5b-instruct-q4_k_m.gguf}
      - LLM_THINKING_ENABLED=${LLM_THINKING_ENABLED:-False}
      - LLM_CONTEXT_SIZE=${LLM_CONTEXT_SIZE:-4096}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-512}
      - LLM_THREADS=${LLM_THREADS:-0}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.0}
      - LLM_MIN_RELEVANCE_SCORE=${LLM_MIN_RELEVANCE_SCORE:-0.0}
    volumes:
      # Mount the knowledge base directory for file storage — set
      # KNOWLEDGE_DATA_PATH in .env (copy .env.example), defaults to ./data
      - ${KNOWLEDGE_DATA_PATH:-./data}:/app/data
      # Persist downloaded LLM weights across container rebuilds (~1GB).
      - models_data:/app/models
      # Mount WSL library for AMD DirectML support on Windows
      - /usr/lib/wsl:/usr/lib/wsl
    # GPU Acceleration Setup:
    # 1. For AMD GPUs (Windows/WSL2 DirectML):
    devices:
      - /dev/dxg:/dev/dxg
    # 2. For NVIDIA GPUs, uncomment below instead of devices above:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    restart: unless-stopped

  # Frontend service (Vite + Express app)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: local-rag-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:8000
      - PORT=3000
    restart: unless-stopped

volumes:
  redis_data:
  models_data: